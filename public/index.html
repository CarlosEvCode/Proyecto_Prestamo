<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPro | Gestión de Herramientas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="bi bi-lightning-charge-fill"></i></div>
        <div>
          <div class="brand-name">StockPro</div>
          <div class="text-muted" style="font-size: 10px; letter-spacing: 1px;">SISTEMA v1.0</div>
        </div>
      </div>

      <nav class="sidebar-nav mt-4">
        <div class="nav-section-label">Principal</div>
        <a href="#" class="nav-item active" data-page="dashboard">
          <i class="bi bi-grid-fill"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="herramientas">
          <i class="bi bi-tools"></i>
          <span>Herramientas</span>
        </a>
        <a href="#" class="nav-item" data-page="trabajadores">
          <i class="bi bi-people-fill"></i>
          <span>Trabajadores</span>
        </a>
        
        <div class="nav-section-label mt-4">Configuración</div>
        <a href="#" class="nav-item" data-page="catalogos">
          <i class="bi bi-folder-fill"></i>
          <span>Catálogos</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted text-sm">Hola, Admin</span>
            <div style="width: 35px; height: 35px; background: #2a2d3e; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-person"></i>
            </div>
        </div>
      </header>

      <div class="p-4" id="pageContainer">
          <!-- Contenido dinámico -->
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/router.js"></script>
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/catalogos.js"></script>
    <script src="js/modules/herramientas.js"></script>
    <script src="js/modules/trabajadores.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
