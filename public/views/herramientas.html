<div class="container-fluid animate__animated animate__fadeIn">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Inventario de Herramientas</h2>
      <p class="text-muted text-sm">
        Listado general de equipos y herramientas disponibles.
      </p>
    </div>
    <button class="btn btn-primary d-flex align-items-center gap-2">
      <i class="bi bi-plus-lg"></i> Nueva Herramienta
    </button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th class="ps-4">CÓDIGO</th>
              <th>HERRAMIENTA / MODELO</th>
              <th>MARCA</th>
              <th>CONDICIÓN</th>
              <th>UBICACIÓN</th>
              <th class="text-center">ESTADO</th>
              <th class="pe-4 text-end">ACCIONES</th>
            </tr>
          </thead>
          <tbody id="tabla-herramientas">
            <!-- Se cargará dinámicamente -->
            <tr>
              <td colspan="7" class="text-center py-5">
                <div
                  class="spinner-border text-primary spinner-border-sm"
                  role="status"
                ></div>
                <span class="ms-2 text-muted">Cargando inventario...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
