<div class="container-fluid animate__animated animate__fadeIn">
  <!-- Cabecera -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Inventario de Herramientas</h2>
      <p class="text-muted text-sm">Listado general de equipos y herramientas disponibles.</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-dark" id="btnRefreshHerramientas" title="Refrescar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <button class="btn btn-primary d-flex align-items-center gap-2" id="btnNuevaHerramienta">
        <i class="bi bi-plus-lg"></i> Nueva Herramienta
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-3">
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted">
              <i class="bi bi-search"></i>
            </span>
            <input type="text" id="searchHerramientas" class="form-control border-start-0" placeholder="Buscar por código o modelo...">
          </div>
        </div>
        <div class="col-6 col-md-2">
          <select id="filterCondicion" class="form-select">
            <option value="">Todas las condiciones</option>
            <option value="bueno">Bueno</option>
            <option value="regular">Regular</option>
            <option value="malo">Malo</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <select id="filterEstado" class="form-select">
            <option value="">Todos los estados</option>
            <option value="activo">Activos</option>
            <option value="inactivo">Inactivos</option>
          </select>
        </div>
        <div class="col-12 col-md-4 d-flex align-items-center justify-content-end text-muted text-sm">
          <span id="totalHerramientasLabel">0 herramienta(s) encontrada(s)</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th class="ps-4">#</th>
              <th>CÓDIGO</th>
              <th>HERRAMIENTA / MODELO</th>
              <th>MARCA</th>
              <th>CONDICIÓN</th>
              <th class="text-center">ESTADO</th>
              <th class="pe-4 text-end">ACCIONES</th>
            </tr>
          </thead>
          <tbody id="bodyHerramientas">
            <tr>
              <td colspan="7" class="text-center py-5">
                <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
                <span class="ms-2 text-muted">Cargando inventario...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!--  MODAL HERRAMIENTA  -->
<div class="modal-overlay-container" id="modalHerramientaOverlay">
  <div class="modal-overlay-content">
    <div class="modal-header-custom">
      <div>
        <h5 id="modalHerramientaTitle">Nueva Herramienta</h5>
        <small class="text-muted" id="modalHerramientaSubtitle">Información del equipo</small>
      </div>
      <button type="button" class="btn-close" id="btnCloseModalHerramienta">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formHerramienta" novalidate>
        <input type="hidden" id="herramientaId" />
        <div class="row g-3">
          <div class="col-md-6">
            <label for="hCodigo" class="form-label">Código <span class="text-danger">*</span></label>
            <input type="text" id="hCodigo" class="form-control" placeholder="Ej: HERR-001" required />
            <div class="invalid-feedback d-block" id="err-hCodigo"></div>
          </div>
          <div class="col-md-6">
            <label for="hNumeroSerie" class="form-label">N° Serie</label>
            <input type="text" id="hNumeroSerie" class="form-control" placeholder="Opcional" />
          </div>
          <div class="col-12">
            <label for="hModelo" class="form-label">Modelo <span class="text-danger">*</span></label>
            <select id="hModelo" class="form-select" required>
              <option value="">-- Seleccionar modelo --</option>
            </select>
            <div class="invalid-feedback d-block" id="err-hModelo"></div>
          </div>
          <div class="col-md-6">
            <label for="hCondicion" class="form-label">Condición <span class="text-danger">*</span></label>
            <select id="hCondicion" class="form-select" required>
              <option value="bueno">BUENO</option>
              <option value="regular">REGULAR</option>
              <option value="malo">MALO</option>
            </select>
            <div class="invalid-feedback d-block" id="err-hCondicion"></div>
          </div>
          <div class="col-md-6">
            <label for="hActivo" class="form-label">Estado Sistema</label>
            <select id="hActivo" class="form-select">
              <option value="1">ACTIVO</option>
              <option value="0">INACTIVO</option>
            </select>
          </div>
          <div class="col-12">
            <label for="hUbicacion" class="form-label">Ubicación</label>
            <input type="text" id="hUbicacion" class="form-control" placeholder="Ej: Almacén A - Estante 2" />
          </div>
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" id="btnCancelHerramienta">Cancelar</button>
      <button type="button" class="btn btn-primary" id="btnSaveHerramienta">
        <span id="btnSaveHerramientaText"><i class="bi bi-check-lg me-1"></i>Guardar</span>
        <span id="btnSaveHerramientaSpinner" class="d-none">
          <div class="spinner-border spinner-border-sm"></div>
        </span>
      </button>
    </div>
  </div>
</div>
