<div class="page-header">
  <div>
    <h1 class="page-title">Herramientas</h1>
    <p class="page-subtitle">Gestiona las herramientas del catálogo</p>
  </div>
  <button class="btn-primary-action" id="btnNuevaHerramienta">
    <i class="bi bi-plus-lg"></i> Nueva Herramienta
  </button>
</div>

<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="bi bi-search search-icon"></i>
    <input
      type="text"
      id="searchHerramienta"
      class="search-input"
      placeholder="Buscar herramienta…"
    />
  </div>
  <button class="btn-icon-outline" id="btnRefreshHerramientas" title="Recargar">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<div class="card-panel">
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr>
          <th>#</th>
          <th>Código / Serie</th>
          <th>Modelo</th>
          <th>Condición</th>
          <th>Ubicación</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="bodyHerramientas">
        <tr>
          <td colspan="7" class="text-center py-5">
            <div class="spinner-custom"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="table-footer">
    <span class="text-muted text-sm" id="totalHerramientasLabel"
      >Cargando…</span
    >
  </div>
</div>

<!-- ══ MODAL HERRAMIENTA (local a esta vista) ══ -->
<div class="modal-overlay" id="modalHerramientaOverlay">
  <div class="modal-panel modal-sm">
    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom" id="modalHerramientaTitle">
          Nueva Herramienta
        </div>
        <div class="modal-subtitle">Gestiona los datos de la herramienta</div>
      </div>
      <button class="btn-modal-close" id="btnCloseModalHerramienta">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="modal-body-custom">
      <form id="formHerramienta" novalidate>
        <input type="hidden" id="herramientaId" />

        <label class="form-label-custom"
          >Código <span class="required">*</span></label
        >
        <input
          type="text"
          id="hCodigo"
          class="input-custom"
          placeholder="Ej: HER-001"
          maxlength="50"
          required
        />
        <div class="field-error" id="err-hCodigo"></div>

        <label class="form-label-custom">Número de Serie</label>
        <input
          type="text"
          id="hNumeroSerie"
          class="input-custom"
          placeholder="Ej: SN-2025-001"
          maxlength="100"
        />

        <label class="form-label-custom"
          >Modelo <span class="required">*</span></label
        >
        <select id="hModelo" class="input-custom" required>
          <option value="">-- Selecciona un modelo --</option>
        </select>
        <div class="field-error" id="err-hModelo"></div>

        <label class="form-label-custom">Condición</label>
        <select id="hCondicion" class="input-custom">
          <option value="bueno">Bueno</option>
          <option value="regular">Regular</option>
          <option value="malo">Malo</option>
        </select>

        <label class="form-label-custom">Ubicación</label>
        <input
          type="text"
          id="hUbicacion"
          class="input-custom"
          placeholder="Ej: Almacén A"
          maxlength="100"
        />

        <label class="form-checkbox-custom">
          <input type="checkbox" id="hActivo" checked />
          <span>Activa</span>
        </label>
      </form>
    </div>
    <div class="modal-footer-custom">
      <button class="btn-cancel" id="btnCancelHerramienta">Cancelar</button>
      <button class="btn-save" id="btnSaveHerramienta">
        <span id="btnSaveHerramientaText"
          ><i class="bi bi-check-lg me-1"></i> Guardar</span
        >
        <span id="btnSaveHerramientaSpinner" class="d-none"
          ><div class="spinner-sm"></div
        ></span>
      </button>
    </div>
  </div>
</div>
