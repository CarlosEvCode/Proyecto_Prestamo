<div class="container-fluid animate__animated animate__fadeIn">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Inventario de Herramientas</h2>
      <p class="text-muted text-sm">
        Listado general de equipos y herramientas disponibles.
      </p>
    </div>
    <button class="btn btn-primary d-flex align-items-center gap-2">
      <i class="bi bi-plus-lg"></i> Nueva Herramienta
    </button>
  </div>

  <!-- Búsqueda y Filtros -->
  <div class="mb-4 d-flex gap-3">
    <div style="flex: 1">
      <input
        type="text"
        id="searchHerramientas"
        class="form-control"
        placeholder="Buscar por código, modelo, marca o ubicación..."
      />
    </div>
    <select id="filterCondicion" class="form-select" style="width: 180px">
      <option value="">Condiciones</option>
      <option value="bueno">Bueno</option>
      <option value="regular">Regular</option>
      <option value="malo">Malo</option>
    </select>
    <select id="filterEstado" class="form-select" style="width: 150px">
      <option value="">Estados</option>
      <option value="activo">Activo</option>
      <option value="inactivo">Inactivo</option>
    </select>
    <button id="btnRefreshHerramientas" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>

  <!-- Contador -->
  <div class="mb-3 text-muted text-sm">
    <span id="totalHerramientasLabel">0 herramienta(s) encontrada(s)</span>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th class="ps-4">#</th>
              <th>CÓDIGO</th>
              <th>HERRAMIENTA / MODELO</th>
              <th>CONDICIÓN</th>
              <th>UBICACIÓN</th>
              <th class="text-center">ESTADO</th>
              <th class="pe-4 text-end">ACCIONES</th>
            </tr>
          </thead>
          <tbody id="bodyHerramientas">
            <!-- Se cargará dinámicamente -->
            <tr>
              <td colspan="7" class="text-center py-5">
                <div
                  class="spinner-border text-primary spinner-border-sm"
                  role="status"
                ></div>
                <span class="ms-2 text-muted">Cargando inventario...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Herramienta -->
<div class="modal-overlay-container" id="modalHerramientaOverlay">
  <div class="modal-overlay-content">
    <div class="modal-header-custom">
      <div>
        <h5 id="modalHerramientaTitle">Nueva Herramienta</h5>
        <small class="text-muted">Detalles del inventario</small>
      </div>
      <button class="btn-modal-close" id="btnCloseModalHerramienta">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formHerramienta" novalidate>
        <input type="hidden" id="herramientaId" />

        <!-- Código y Número de Serie -->
        <div class="mb-3">
          <label for="hCodigo" class="form-label">
            Código <span class="text-danger">*</span>
          </label>
          <input
            type="text"
            id="hCodigo"
            class="form-control"
            placeholder="Ej: HER-001"
            required
          />
          <div class="invalid-feedback d-block" id="err-hCodigo"></div>
        </div>

        <div class="mb-3">
          <label for="hNumeroSerie" class="form-label">Número de Serie</label>
          <input
            type="text"
            id="hNumeroSerie"
            class="form-control"
            placeholder="Ej: SN-001-2025"
          />
        </div>

        <!-- Modelo y Marca -->
        <div class="mb-3">
          <label for="hModelo" class="form-label">
            Modelo <span class="text-danger">*</span>
          </label>
          <select id="hModelo" class="form-select" required>
            <option value="">-- Selecciona un modelo --</option>
          </select>
          <div class="invalid-feedback d-block" id="err-hModelo"></div>
        </div>

        <!-- Condición -->
        <div class="mb-3">
          <label for="hCondicion" class="form-label">
            Condición <span class="text-danger">*</span>
          </label>
          <select id="hCondicion" class="form-select" required>
            <option value="">-- Selecciona una condición --</option>
            <option value="bueno">Bueno</option>
            <option value="regular">Regular</option>
            <option value="malo">Malo</option>
          </select>
          <div class="invalid-feedback d-block" id="err-hCondicion"></div>
        </div>

        <!-- Ubicación -->
        <div class="mb-3">
          <label for="hUbicacion" class="form-label">Ubicación</label>
          <input
            type="text"
            id="hUbicacion"
            class="form-control"
            placeholder="Ej: Almacén A"
          />
        </div>

        <!-- Estado (Activo/Inactivo) -->
        <div class="mb-3">
          <label for="hActivo" class="form-label">Estado</label>
          <select id="hActivo" class="form-select">
            <option value="1">Activo</option>
            <option value="0">Inactivo</option>
          </select>
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" id="btnCancelHerramienta">
        Cancelar
      </button>
      <button type="button" class="btn btn-primary" id="btnSaveHerramienta">
        <span id="btnSaveHerramientaText">
          <i class="bi bi-check-lg me-1"></i>Guardar
        </span>
        <span id="btnSaveHerramientaSpinner" class="d-none">
          <div class="spinner-border spinner-border-sm"></div>
        </span>
      </button>
    </div>
  </div>
</div>
