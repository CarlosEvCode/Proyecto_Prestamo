<div class="container-fluid animate__animated animate__fadeIn">
  <!-- Cabecera -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Registro de Préstamos</h2>
      <p class="text-muted text-sm">Seguimiento de herramientas entregadas al personal.</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-dark" id="btnRefreshPrestamos" title="Refrescar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <button class="btn btn-primary d-flex align-items-center gap-2" id="btnNuevoPrestamo">
        <i class="bi bi-send-fill"></i> Nuevo Préstamo
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-3">
      <div class="row g-3">
        <div class="col-12 col-md-5">
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted">
              <i class="bi bi-search"></i>
            </span>
            <input type="text" id="searchPrestamo" class="form-control border-start-0" placeholder="Buscar por trabajador o motivo...">
          </div>
        </div>
        <div class="col-6 col-md-3">
          <select id="filterEstado" class="form-select">
            <option value="">Todos los estados</option>
            <option value="activo">Activos</option>
            <option value="devuelto">Devueltos</option>
            <option value="vencido">Vencidos</option>
          </select>
        </div>
        <div class="col-6 col-md-4 d-flex align-items-center justify-content-end text-muted text-sm">
          <span id="totalPrestamosLabel">0 préstamo(s) encontrado(s)</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th class="ps-4">#</th>
              <th>TRABAJADOR / MOTIVO</th>
              <th>FECHA SALIDA</th>
              <th>DEVOLUCIONES</th>
              <th class="text-center">ESTADO</th>
              <th class="pe-4 text-end">ACCIONES</th>
            </tr>
          </thead>
          <tbody id="bodyPrestamos">
            <tr>
              <td colspan="6" class="text-center py-5">
                <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
                <span class="ms-2 text-muted">Cargando préstamos...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL PRÉSTAMO -->
<div class="modal-overlay-container" id="modalPrestamosOverlay">
  <div class="modal-overlay-content">
    <div class="modal-header-custom">
      <div>
        <h5 id="modalPrestamosTitle">Nuevo Préstamo</h5>
        <small class="text-muted">Registro de herramientas prestadas</small>
      </div>
      <button type="button" class="btn-close" id="btnCloseModalPrestamos">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formPrestamos" novalidate>
        <input type="hidden" id="prestamoId" />
        <div class="row g-3">
          <div class="col-12">
            <label for="pTrabajador" class="form-label">Trabajador <span class="text-danger">*</span></label>
            <select id="pTrabajador" class="form-select" required></select>
            <div class="invalid-feedback d-block" id="err-pTrabajador"></div>
          </div>
          <div class="col-12">
            <label for="pHerramienta" class="form-label">Herramienta <span class="text-danger">*</span></label>
            <select id="pHerramienta" class="form-select" required></select>
            <div class="invalid-feedback d-block" id="err-pHerramienta"></div>
          </div>
          <div class="col-12">
            <label for="pMotivo" class="form-label">Motivo</label>
            <textarea id="pMotivo" class="form-control" placeholder="Ej: Reparación de muro" maxlength="200" rows="2"></textarea>
          </div>
          <div class="col-md-6">
            <label for="pFechaDev" class="form-label">Devolución Esperada</label>
            <input type="date" id="pFechaDev" class="form-control" />
          </div>
          <div class="col-md-6">
            <label for="pEstado" class="form-label">Estado <span class="text-danger">*</span></label>
            <select id="pEstado" class="form-select" required>
              <option value="activo">ACTIVO</option>
              <option value="devuelto">DEVUELTO</option>
              <option value="vencido">VENCIDO</option>
            </select>
            <div class="invalid-feedback d-block" id="err-pEstado"></div>
          </div>
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" id="btnCancelPrestamo">Cancelar</button>
      <button type="button" class="btn btn-primary" id="btnSavePrestamo">
        <span id="btnSavePrestamoText"><i class="bi bi-check-lg me-1"></i>Guardar</span>
        <span id="btnSavePrestamoSpinner" class="d-none">
          <div class="spinner-border spinner-border-sm"></div>
        </span>
      </button>
    </div>
  </div>
</div>

<!-- MODAL DEVOLUCIÓN -->
<div class="modal-overlay-container" id="modalDevolucionOverlay">
  <div class="modal-overlay-content modal-sm">
    <div class="modal-header-custom">
      <div>
        <h5>Registrar Devolución</h5>
        <small class="text-muted">Actualizar estado de la herramienta</small>
      </div>
      <button type="button" class="btn-close" id="btnCloseModalDevolucion">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formDevolucion">
        <input type="hidden" id="dPrestamoId" />
        <input type="hidden" id="dHerramientaId" />
        <div class="mb-3">
          <label class="form-label">Herramienta</label>
          <input type="text" id="dHerramientaNombre" class="form-control-plaintext text-white fw-bold" readonly />
        </div>
        <div class="mb-3">
          <label for="dCondicion" class="form-label">Condición de Regreso <span class="text-danger">*</span></label>
          <select id="dCondicion" class="form-select" required>
            <option value="bueno">BUENO</option>
            <option value="regular">REGULAR</option>
            <option value="malo">MALO (Fuera de servicio)</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="dFechaReal" class="form-label">Fecha Devolución</label>
          <input type="date" id="dFechaReal" class="form-control" />
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" id="btnCancelDevolucion">Cancelar</button>
      <button type="button" class="btn btn-success" id="btnSaveDevolucion">
        <span id="btnSaveDevolucionText"><i class="bi bi-check2-circle me-1"></i> Confirmar Regreso</span>
        <span id="btnSaveDevolucionSpinner" class="d-none">
          <div class="spinner-border spinner-border-sm"></div>
        </span>
      </button>
    </div>
  </div>
</div>
