<div class="page-header">
  <div>
    <h1 class="page-title">Modelos</h1>
    <p class="page-subtitle">Gestiona los modelos de herramientas</p>
  </div>
  <button class="btn-primary-action" id="btnNuevoModelo">
    <i class="bi bi-plus-lg"></i> Nuevo Modelo
  </button>
</div>

<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="bi bi-search search-icon"></i>
    <input
      type="text"
      id="searchModelo"
      class="search-input"
      placeholder="Buscar modelo…"
    />
  </div>
  <button class="btn-icon-outline" id="btnRefreshModelos" title="Recargar">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<div class="card-panel">
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre del Modelo</th>
          <th>Marca</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="bodyModelos">
        <tr>
          <td colspan="4" class="text-center py-5">
            <div class="spinner-custom"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="table-footer">
    <span class="text-muted text-sm" id="totalModelosLabel">Cargando…</span>
  </div>
</div>

<!-- ══ MODAL MODELO (local a esta vista) ══ -->
<div class="modal-overlay" id="modalModeloOverlay">
  <div class="modal-panel modal-sm">
    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom" id="modalModeloTitle">Nuevo Modelo</div>
        <div class="modal-subtitle">Gestiona los datos del modelo</div>
      </div>
      <button class="btn-modal-close" id="btnCloseModalModelo">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="modal-body-custom">
      <form id="formModelo" novalidate>
        <input type="hidden" id="modeloId" />

        <label class="form-label-custom"
          >Nombre <span class="required">*</span></label
        >
        <input
          type="text"
          id="mNombre"
          class="input-custom"
          placeholder="Ej: Taladro TDH-500"
          maxlength="100"
          required
        />
        <div class="field-error" id="err-mNombre"></div>

        <label class="form-label-custom"
          >Marca <span class="required">*</span></label
        >
        <select id="mMarca" class="input-custom" required>
          <option value="">-- Selecciona una marca --</option>
        </select>
        <div class="field-error" id="err-mMarca"></div>
      </form>
    </div>
    <div class="modal-footer-custom">
      <button class="btn-cancel" id="btnCancelModelo">Cancelar</button>
      <button class="btn-save" id="btnSaveModelo">
        <span id="btnSaveModeloText"
          ><i class="bi bi-check-lg me-1"></i> Guardar</span
        >
        <span id="btnSaveModeloSpinner" class="d-none"
          ><div class="spinner-sm"></div
        ></span>
      </button>
    </div>
  </div>
</div>
