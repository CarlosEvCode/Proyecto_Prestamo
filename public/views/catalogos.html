<div class="container-fluid animate__animated animate__fadeIn">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Configuración de Catálogos</h2>
      <p class="text-muted text-sm">Gestión de Marcas y Modelos.</p>
    </div>
    <button
      class="btn btn-primary d-flex align-items-center gap-2"
      id="btnNuevo"
    >
      <i class="bi bi-plus-lg"></i> Nuevo
    </button>
  </div>

  <!-- Navegación de Pestañas -->
  <div class="d-flex gap-2 mb-3 align-items-center">
    <div
      class="nav nav-tabs border-0 gap-2 flex-grow-1"
      id="catalogTabs"
      role="tablist"
    >
      <button
        class="nav-link-custom active"
        id="marcas-tab"
        type="button"
        onclick="Catalogos.switchTab('marcas')"
      >
        <i class="bi bi-tag me-2"></i>Marcas
      </button>
      <button
        class="nav-link-custom"
        id="modelos-tab"
        type="button"
        onclick="Catalogos.switchTab('modelos')"
      >
        <i class="bi bi-layers me-2"></i>Modelos
      </button>
    </div>
    <button
      class="btn btn-outline-secondary"
      id="btnRefreshCatalogo"
      title="Recargar"
    >
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>

  <!-- Búsqueda y Filtros -->
  <div class="d-flex gap-2 mb-3">
    <div class="flex-grow-1">
      <input
        type="text"
        id="searchCatalogo"
        class="form-control"
        placeholder="Buscar por nombre o ID…"
      />
    </div>
  </div>

  <!-- Tabla -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead id="catalog-thead"></thead>
          <tbody id="catalog-tbody">
            <tr>
              <td colspan="5" class="text-center py-5">
                <div
                  class="spinner-border text-primary spinner-border-sm"
                  role="status"
                ></div>
                <span class="ms-2 text-muted">Cargando catálogos...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div
        class="px-4 py-3 border-top text-muted text-sm"
        id="totalCatalogosLabel"
      >
        Cargando…
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ MODAL MARCAS ════════════════════════════════════════════ -->
<div class="modal-overlay-container" id="modalMarcasOverlay">
  <div class="modal-overlay-content">
    <div class="modal-header-custom">
      <div>
        <h5 id="modalMarcasTitle">Nueva Marca</h5>
        <small class="text-muted">Agregar o editar marca</small>
      </div>
      <button type="button" class="btn-close" id="btnCloseMarcas">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formMarcas" novalidate>
        <input type="hidden" id="marcaId" />

        <div class="mb-3">
          <label for="mNombre" class="form-label"
            >Nombre <span class="text-danger">*</span></label
          >
          <input
            type="text"
            id="mNombre"
            class="form-control"
            placeholder="Ingrese nombre de la marca"
            maxlength="100"
            required
          />
          <div class="invalid-feedback d-block" id="err-mNombre"></div>
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" id="btnCancelMarcas">
        Cancelar
      </button>
      <button type="button" class="btn btn-primary" id="btnSaveMarcas">
        <span id="btnSaveMarcasText"
          ><i class="bi bi-check-lg me-1"></i>Guardar</span
        >
        <span id="btnSaveMarcasSpinner" class="d-none"
          ><div class="spinner-border spinner-border-sm"></div
        ></span>
      </button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ MODAL MODELOS ════════════════════════════════════════════ -->
<div class="modal-overlay-container" id="modalModelosOverlay">
  <div class="modal-overlay-content">
    <div class="modal-header-custom">
      <div>
        <h5 id="modalModelosTitle">Nuevo Modelo</h5>
        <small class="text-muted">Agregar o editar modelo</small>
      </div>
      <button type="button" class="btn-close" id="btnCloseModelos">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formModelos" novalidate>
        <input type="hidden" id="modeloId" />

        <div class="mb-3">
          <label for="moNombre" class="form-label"
            >Nombre <span class="text-danger">*</span></label
          >
          <input
            type="text"
            id="moNombre"
            class="form-control"
            placeholder="Ingrese nombre del modelo"
            maxlength="100"
            required
          />
          <div class="invalid-feedback d-block" id="err-moNombre"></div>
        </div>

        <div class="mb-3">
          <label for="moMarca" class="form-label"
            >Marca <span class="text-danger">*</span></label
          >
          <select id="moMarca" class="form-select" required>
            <option value="">-- Seleccionar Marca --</option>
          </select>
          <div class="invalid-feedback d-block" id="err-moMarca"></div>
        </div>

        <div class="mb-3">
          <label for="moCategoria" class="form-label"
            >Categoría <span class="text-danger">*</span></label
          >
          <select id="moCategoria" class="form-select" required>
            <option value="">-- Seleccionar Categoría --</option>
          </select>
          <div class="invalid-feedback d-block" id="err-moCategoria"></div>
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" id="btnCancelModelos">
        Cancelar
      </button>
      <button type="button" class="btn btn-primary" id="btnSaveModelos">
        <span id="btnSaveModelosText"
          ><i class="bi bi-check-lg me-1"></i>Guardar</span
        >
        <span id="btnSaveModelosSpinner" class="d-none"
          ><div class="spinner-border spinner-border-sm"></div
        ></span>
      </button>
    </div>
  </div>
</div>
