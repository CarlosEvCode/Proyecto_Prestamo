<div class="container-fluid animate__animated animate__fadeIn">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Configuración de Catálogos</h2>
      <p class="text-muted text-sm">Gestión de tablas maestras del sistema.</p>
    </div>
  </div>

  <!-- Navegación de Pestañas -->
  <ul class="nav nav-tabs border-0 mb-4 gap-2" id="catalogTabs" role="tablist">
    <li class="nav-item-tab" role="presentation">
      <button
        class="nav-link-custom active"
        id="areas-tab"
        data-bs-toggle="tab"
        data-bs-target="#areas-pane"
        type="button"
        role="tab"
        onclick="Catalogos.switchTab('areas')"
      >
        <i class="bi bi-geo-alt me-2"></i>Áreas
      </button>
    </li>
    <li class="nav-item-tab" role="presentation">
      <button
        class="nav-link-custom"
        id="marcas-tab"
        data-bs-toggle="tab"
        data-bs-target="#marcas-pane"
        type="button"
        role="tab"
        onclick="Catalogos.switchTab('marcas')"
      >
        <i class="bi bi-tag me-2"></i>Marcas
      </button>
    </li>
    <li class="nav-item-tab" role="presentation">
      <button
        class="nav-link-custom"
        id="categorias-tab"
        data-bs-toggle="tab"
        data-bs-target="#categorias-pane"
        type="button"
        role="tab"
        onclick="Catalogos.switchTab('categorias')"
      >
        <i class="bi bi-grid me-2"></i>Categorías
      </button>
    </li>
    <li class="nav-item-tab" role="presentation">
      <button
        class="nav-link-custom"
        id="modelos-tab"
        data-bs-toggle="tab"
        data-bs-target="#modelos-pane"
        type="button"
        role="tab"
        onclick="Catalogos.switchTab('modelos')"
      >
        <i class="bi bi-layers me-2"></i>Modelos
      </button>
    </li>
  </ul>

  <!-- Contenido de las Pestañas -->
  <div class="tab-content" id="catalogTabsContent">
    <!-- Panel Genérico para todas las tablas -->
    <div class="card border-0 shadow-sm">
      <div
        class="card-header bg-transparent border-0 p-4 d-flex justify-content-between align-items-center"
      >
        <h5 class="mb-0" id="catalog-title">Listado de Áreas</h5>
        <button
          class="btn btn-primary btn-sm px-3"
          onclick="Catalogos.openModal()"
        >
          <i class="bi bi-plus-lg me-1"></i> Agregar
        </button>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead id="catalog-thead">
              <!-- Se carga dinámicamente -->
            </thead>
            <tbody id="catalog-tbody">
              <!-- Se carga dinámicamente -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
