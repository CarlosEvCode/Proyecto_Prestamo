<div class="container-fluid animate__animated animate__fadeIn">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Configuración de Catálogos</h2>
      <p class="text-muted text-sm">Gestión de Marcas, Modelos y Proveedores.</p>
    </div>
    <button
      class="btn btn-primary d-flex align-items-center gap-2"
      id="btnNuevo"
    >
      <i class="bi bi-plus-lg"></i> Nuevo
    </button>
  </div>

  <!-- Navegación de Pestañas -->
  <div class="d-flex gap-2 mb-3 align-items-center">
    <div
      class="nav nav-tabs border-0 gap-2 flex-grow-1"
      id="catalogTabs"
      role="tablist"
    >
      <button
        class="nav-link-custom d-none"
        id="areas-tab"
        type="button"
        onclick="Catalogos.switchTab('areas')"
      >
        <i class="bi bi-geo-alt me-2"></i>Áreas
      </button>
      <button
        class="nav-link-custom active"
        id="marcas-tab"
        type="button"
        onclick="Catalogos.switchTab('marcas')"
      >
        <i class="bi bi-tag me-2"></i>Marcas
      </button>
      <button
        class="nav-link-custom d-none"
        id="categorias-tab"
        type="button"
        onclick="Catalogos.switchTab('categorias')"
      >
        <i class="bi bi-grid me-2"></i>Categorías
      </button>
      <button
        class="nav-link-custom"
        id="modelos-tab"
        type="button"
        onclick="Catalogos.switchTab('modelos')"
      >
        <i class="bi bi-layers me-2"></i>Modelos
      </button>
      <button
        class="nav-link-custom d-none"
        id="proveedores-tab"
        type="button"
        onclick="Catalogos.switchTab('proveedores')"
      >
        <i class="bi bi-truck me-2"></i>Proveedores
      </button>
    </div>
    <button
      class="btn btn-outline-secondary"
      id="btnRefreshCatalogo"
      title="Recargar"
    >
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>

  <!-- Búsqueda y Filtros -->
  <div class="d-flex gap-2 mb-3">
    <div class="flex-grow-1">
      <input
        type="text"
        id="searchCatalogo"
        class="form-control"
        placeholder="Buscar por nombre o ID…"
      />
    </div>
  </div>

  <!-- Tabla -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead id="catalog-thead"></thead>
          <tbody id="catalog-tbody">
            <tr>
              <td colspan="5" class="text-center py-5">
                <div
                  class="spinner-border text-primary spinner-border-sm"
                  role="status"
                ></div>
                <span class="ms-2 text-muted">Cargando catálogos...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div
        class="px-4 py-3 border-top text-muted text-sm"
        id="totalCatalogosLabel"
      >
        Cargando…
      </div>
    </div>
  </div>
</div>

<!--  MODAL CATALOGO  -->
<div class="modal-overlay-container" id="modalCatalogosOverlay">
  <div class="modal-overlay-content">
    <div class="modal-header-custom">
      <div>
        <h5 id="modalCatalogTitle">Nuevo Registro</h5>
        <small class="text-muted" id="modalCatalogSubtitle">Agregar o editar</small>
      </div>
      <button type="button" class="btn-close" id="btnCloseCatalogo">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formCatalogo" novalidate>
        <input type="hidden" id="catalogId" />

        <div class="mb-3">
          <label for="cNombre" class="form-label"
            >Nombre <span class="text-danger">*</span></label
          >
          <input
            type="text"
            id="cNombre"
            class="form-control"
            placeholder="Ingrese nombre"
            maxlength="100"
            required
          />
          <div class="invalid-feedback d-block" id="err-cNombre"></div>
        </div>

        <!-- Solo para Modelos -->
        <div class="mb-3" id="fieldMarca" style="display: none;">
          <label for="cMarca" class="form-label"
            >Marca <span class="text-danger">*</span></label
          >
          <select id="cMarca" class="form-select" required>
            <option value="">-- Seleccionar Marca --</option>
          </select>
          <div class="invalid-feedback d-block" id="err-cMarca"></div>
        </div>

        <div class="mb-3" id="fieldCategoria" style="display: none;">
          <label for="cCategoria" class="form-label"
            >Categoría <span class="text-danger">*</span></label
          >
          <select id="cCategoria" class="form-select" required>
            <option value="">-- Seleccionar Categoría --</option>
          </select>
          <div class="invalid-feedback d-block" id="err-cCategoria"></div>
        </div>

        <!-- Solo para Proveedores -->
        <div class="mb-3" id="fieldContacto" style="display: none;">
          <label for="cContacto" class="form-label">Contacto (Teléfono/Email)</label>
          <input type="text" id="cContacto" class="form-control" placeholder="Ej: 555-0199" />
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" id="btnCancelCatalogo">
        Cancelar
      </button>
      <button type="button" class="btn btn-primary" id="btnSaveCatalogo">
        <span id="btnSaveCatalogoText"
          ><i class="bi bi-check-lg me-1"></i>Guardar</span
        >
        <span id="btnSaveCatalogoSpinner" class="d-none"
          ><div class="spinner-border spinner-border-sm"></div
        ></span>
      </button>
    </div>
  </div>
</div>
