<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro - Iniciar Sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page-body">

    <script>
        // Asegurar que no hay sesión anterior 
        localStorage.removeItem('token');
        localStorage.removeItem('usuarioNombre');
    </script>

    <div class="login-card">
        <div class="logo-icon">
            <i class="bi bi-lightning-charge-fill"></i>
        </div>
        <h2>StockPro</h2>
        <p>Ingresa tus credenciales para acceder</p>

        <form id="form-login">
            <div class="login-form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Tu nombre de usuario" required autocomplete="off">
            </div>
            <div class="login-form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>
            <button type="submit" class="btn-login">
                <span id="btnLoginText">Ingresar al Sistema</span>
                <span id="btnLoginSpinner" class="d-none ms-2"><span class="spinner-border spinner-border-sm"></span></span>
            </button>
        </form>

        <div id="mensaje-error" class="mensaje-error">Usuario o contraseña incorrectos</div>
    </div>

    <script src="js/modules/login.js"></script>

</body>
</html>
